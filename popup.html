<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #262626;
      background-color: #fafafa;
    }
    h3 {
      margin-top: 0;
      font-size: 16px;
      border-bottom: 1px solid #dbdbdb;
      padding-bottom: 8px;
    }
    label {
      font-size: 14px;
      font-weight: 600;
      display: block;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 12px;
      border: 1px solid #dbdbdb;
      border-radius: 4px;
      box-sizing: border-box;
      font-family: monospace;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #0095f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #0077c2;
    }
    #status {
      margin-top: 10px;
      font-size: 13px;
      color: #0095f6;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <h3>🛡️ ClaimGuard Settings</h3>
  <label for="apiKey">Google Gemini API Key:</label>
  <input type="password" id="apiKey" placeholder="AIzaSy...">
  <button id="saveBtn">Save Configuration</button>
  <div id="status">API Key saved successfully!</div>
  <script src="popup.js"></script>
</body>
</html>
